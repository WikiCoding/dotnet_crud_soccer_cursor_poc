services:
  postgres:
    image: postgres:latest
    container_name: soccer-db
    environment:
      POSTGRES_DB: soccer-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"
    volumes:
      - soccer-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: soccer-redis
    ports:
      - "6379:6379"

volumes:
  soccer-data:
